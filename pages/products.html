<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products - Porsche Store</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    .social-icon i {
      font-size: 50px;
      color: red;
      filter: drop-shadow(1px 1px 2px rgb(208, 202, 202));
    }

    .social-icon {
      height: fit-content;
      width: fit-content;
      background-color: none;
      border: none;
    }
  </style>
  <script src="../script.js" defer></script>
</head>

<body>
  <!-- HEADER -->
  <header class="main-header">
    <div class="header-content">
      <div class="logo-section">
        <img src="../images/logo.png" alt="Porsche Logo" class="header-logo" />
        <span class="brand-name">Porsche</span>
      </div>
      <nav class="main-nav">
        <a href="home.html">Home</a>
        <a href="products.html" class="active">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" aria-label="Toggle theme">
          <i class="fa-solid fa-sun"></i>
        </button>
        <a href="cart.html" class="cart-link">
          <i class="fa-solid fa-cart-shopping"></i>
          <span>Cart (<span id="cart-count">0</span>)</span>
        </a>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <section class="products-section">
      <h2 class="section-title">porsche</h2>
      <div class="search-container">
        <input type="text" id="search-bar" placeholder="Search products..." />
        <i class="fa-solid fa-search search-icon"></i>
      </div>
      <div class="category-filter">
        <button class="category-btn active" data-category="all">
          All Products
        </button>
        <button class="category-btn" data-category="cars">
          cars
        </button>
        <button class="category-btn" data-category="Motors">
          Motors
        </button>
        <button class="category-btn" data-category="jacket">
          jacket
        </button>
      </div>
      <div class="items">
        <!-- cars Category -->
        <div class="product-container" data-name=" 911 GT3" data-category="cars">
          <div class="product-image-wrapper">
            <img src="911.jpg" alt="porsche 911 GT3" onerror="this.src='../images/911.jpg'" />
          </div>
          <div class="product-info">
            <h3>911 GT3</h3>
            <p class="product-price">$345,300.00</p>
            <button class="add-to-cart" data-product="porsche 911 GT3" data-price="345,300.00">
              Add to Cart
            </button>
          </div>
        </div>


        <!-- cars Category -->
        <div class="product-container" data-name=" Macan" data-category="cars">
          <div class="product-image-wrapper">
            <img src="Macan.jpg" alt="Porsche Macan" onerror="this.src='../images/Macan.jpg'" />
          </div>
          <div class="product-info">
            <h3> Macan</h3>
            <p class="product-price">$91,800.00</p>
            <button class="add-to-cart" data-product="Porsche Macan" data-price="91,800.00">
              Add to Cart
            </button>
          </div>
        </div>

        <!--Motors Category -->
        <div class="product-container" data-name="Macan" data-category="Motors">
          <div class="product-image-wrapper">
            <img src="Macan.jpeg" alt="Macan" onerror="this.src='../images/Macan.jpeg'" /><img src="macan.jpeg"
              alt="Macan" onerror="this.src='../images/Macan.jpeg'" />
          </div>
          <div class="product-info">
            <h3>Motors Macan</h3>
            <p class="product-price">$209,000</p>
            <button class="add-to-cart" data-product="Macan" data-price="209,000">
              Add to Cart
            </button>
          </div>
        </div>

        <!--Jacket Category -->
        <div class="product-container" data-name="jacket" data-category="jacket">
          <div class="product-image-wrapper">
            <img src="jackets.jpeg" alt="jacket" onerror="this.src='../images/jackets.jpeg'">
          </div>
          <div class="product-info">
            <h3>jacket</h3>
            <p class="product-price">$70</p>
            <button class="add-to-cart" data-product="creatine" data-price="70">Add to Cart</button>
          </div>
        </div>


         <!-- FOOTER -->
  <footer class="main-footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="home.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <div class="social-media">
        <a href="#" class="social-icon" aria-label="Facebook">
          <i class="fa-brands fa-facebook"></i>
        </a>
        <a href="#" class="social-icon" aria-label="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="#" class="social-icon" aria-label="Snapchat">
          <i class="fa-brands fa-snapchat"></i>
        </a>
        <a href="#" class="social-icon" aria-label="TikTok">
          <i class="fa-brands fa-tiktok"></i>
        </a>
      </div>
      <div class="footer-bottom">
        <p class="footer-credit">Designed by mazzen hammam</p>
        <p>© 2025 porsche Store. All Rights Reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
